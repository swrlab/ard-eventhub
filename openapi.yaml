openapi: 3.0.3
info:
  title: ARD Eventhub
  description: ARD system to distribute real-time (live) metadata for primarily
    radio broadcasts.
  termsOfService: https://www.ard.de
  contact:
    email: lab@swr.de
  license:
    name: European Union Public License 1.2
    url: https://spdx.org/licenses/EUPL-1.2.html
  version: 2.3.4
externalDocs:
  description: ARD Eventhub Documentation
  url: https://swrlab.github.io/ard-eventhub/
servers:
  - url: /
    description: Local (domain-relative) environment
tags:
  - name: auth
    description: Authentication services for Eventhub
  - name: events
    description: Manage events
  - name: subscriptions
    description: Access to subscription management
  - name: topics
    description: Access to topics details
paths:
  /auth/login:
    post:
      tags:
        - auth
      summary: Swap login credentials for a token
      operationId: authLoginPost
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
              required:
                - email
                - password
              additionalProperties: false
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/authResponse'
        '400':
          description: Bad Request (invalid input)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorBadRequest'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorInternalServerError'
  /auth/refresh:
    post:
      tags:
        - auth
      summary: Swap refresh token for new id token
      operationId: authRefreshPost
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
              required:
                - refreshToken
              additionalProperties: false
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/authResponse'
        '400':
          description: Bad Request (invalid input)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorBadRequest'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorInternalServerError'
  /auth/reset:
    post:
      tags:
        - auth
      summary: Request password reset email
      operationId: authResetPost
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
              required:
                - email
              additionalProperties: false
      responses:
        '200':
          description: Request successful
          content: {}
        '400':
          description: Bad Request (invalid input)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorBadRequest'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorInternalServerError'
  /events/de.ard.eventhub.v1.radio.track.next:
    post:
      tags:
        - events
      summary: Distribute a next track
      operationId: eventPostV1RadioTrackNext
      security:
        - bearerAuth: []
      requestBody:
        $ref: '#/components/requestBodies/eventV1RadioTrack'
      responses:
        '201':
          $ref: '#/components/responses/eventV1RadioTrack'
        '400':
          description: Bad Request (invalid input)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorBadRequest'
        '401': &a1
          description: Missing authentication
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorUnauthorized'
        '403': &a2
          description: Invalid authorization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorForbidden'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorInternalServerError'
  /events/de.ard.eventhub.v1.radio.text:
    post:
      tags:
        - events
      summary: Set a live encoder text for a track
      operationId: eventPostV1RadioText
      security:
        - bearerAuth: []
      requestBody:
        $ref: '#/components/requestBodies/eventPostV1RadioText'
      responses:
        '201':
          $ref: '#/components/responses/eventPostV1RadioText'
        '400':
          description: Bad Request (invalid input)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorBadRequest'
        '401': *a1
        '403': *a2
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorInternalServerError'
  /events/de.ard.eventhub.v1.radio.track.playing:
    post:
      tags:
        - events
      summary: Distribute a now-playing track
      operationId: eventPostV1RadioTrackPlaying
      security:
        - bearerAuth: []
      requestBody:
        $ref: '#/components/requestBodies/eventV1RadioTrack'
      responses:
        '201':
          $ref: '#/components/responses/eventV1RadioTrack'
        '400':
          description: Bad Request (invalid input)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorBadRequest'
        '401': *a1
        '403': *a2
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorInternalServerError'
  /subscriptions:
    get:
      tags:
        - subscriptions
      summary: List all subscriptions for this user
      operationId: subscriptionList
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Subscriptions found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/subscriptionsList'
        '401': *a1
        '403': *a2
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorInternalServerError'
    post:
      tags:
        - subscriptions
      summary: Add a new subscription
      operationId: subscriptionPost
      security:
        - bearerAuth: []
      requestBody:
        description: New event to be distributed to subscribers.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/subscriptionPost'
      responses:
        '201':
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/subscriptionResponse'
        '400':
          description: Bad Request (invalid input)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorBadRequest'
        '401': *a1
        '403': *a2
        '404':
          description: Topic for subscription not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorNotFound'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorInternalServerError'
  /subscriptions/{name}:
    get:
      tags:
        - subscriptions
      summary: Get details about a single subscription from this user
      operationId: subscriptionsGet
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          description: '`name` of the desired subscription'
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Subscription found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/subscriptionResponse'
        '401': *a1
        '403': *a2
        '404':
          description: Subscription not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorNotFound'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorInternalServerError'
    delete:
      tags:
        - subscriptions
      summary: Remove a single subscription by this user
      operationId: subscriptionsDelete
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          description: '`name` of the desired subscription'
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Subscription deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/subscriptionDeleted'
        '401': *a1
        '403': *a2
        '404':
          description: Subscription not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorNotFound'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorInternalServerError'
  /topics:
    get:
      tags:
        - topics
      summary: List all available topics
      operationId: topicsGet
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Topics found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/topicResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorInternalServerError'
components:
  requestBodies:
    eventV1RadioTrack:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/eventV1PostBody'
    eventPostV1RadioText:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/eventV1PostRadioTextBody'
  responses:
    eventV1RadioTrack:
      description: Event created
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/eventV1ResBody'
    eventPostV1RadioText:
      description: Event created
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/eventV1PostRadioTextResBody'
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    errorBadRequest:
      type: object
      properties:
        message:
          type: string
        errors:
          minItems: 1
          type: array
          items:
            $ref: __shared#/definitions/schema0
        trace:
          nullable: true
          type: string
      required:
        - message
        - errors
      additionalProperties: false
    errorUnauthorized:
      type: object
      properties:
        message:
          type: string
        errors:
          minItems: 1
          type: array
          items:
            $ref: __shared#/definitions/schema0
        trace:
          nullable: true
          type: string
      required:
        - message
        - errors
      additionalProperties: false
    errorForbidden:
      type: object
      properties:
        message:
          type: string
        errors:
          minItems: 1
          type: array
          items:
            $ref: __shared#/definitions/schema0
        trace:
          nullable: true
          type: string
      required:
        - message
        - errors
      additionalProperties: false
    errorNotFound:
      type: object
      properties:
        message:
          type: string
        trace:
          nullable: true
          type: string
      required:
        - message
      additionalProperties: false
    errorInternalServerError:
      type: object
      properties:
        message:
          type: string
        trace:
          nullable: true
          type: string
      required:
        - message
      additionalProperties: false
    authResponse:
      type: object
      properties:
        expiresIn:
          type: number
        expires:
          type: string
        token:
          type: string
        refreshToken:
          type: string
        user:
          type: object
          additionalProperties: {}
        trace:
          nullable: true
          type: string
      required:
        - expiresIn
        - expires
        - token
        - refreshToken
        - user
      additionalProperties: false
    services:
      type: object
      properties:
        type:
          type: string
          enum:
            - EventLivestream
            - PermanentLivestream
        externalId:
          type: string
        publisherId:
          type: string
        id:
          type: string
      required:
        - type
        - externalId
        - publisherId
      additionalProperties: false
    reference:
      type: object
      properties:
        type:
          type: string
          enum:
            - Episode
            - Section
            - Publication
            - Broadcast
            - Show
            - Season
            - Article
        id:
          type: string
          pattern: ^urn:ard:[a-z0-9-]+:[a-z0-9-]+$
        externalId:
          nullable: true
          type: string
          pattern: ^(c|b)rid:\/\/.+$
        title:
          type: string
        url:
          type: string
        alternateIds:
          type: array
          items:
            type: string
      required:
        - type
        - externalId
      additionalProperties: false
    eventV1PostBody:
      type: object
      properties:
        event:
          type: string
          enum:
            - de.ard.eventhub.v1.radio.track.playing
            - de.ard.eventhub.v1.radio.track.next
        type:
          type: string
          enum:
            - audio
            - commercial
            - jingle
            - live
            - music
            - news
            - traffic
            - weather
        start:
          type: string
          format: iso8601-timestamp
        length:
          nullable: true
          type: number
        title:
          type: string
        artist:
          nullable: true
          type: string
        contributors:
          nullable: true
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              role:
                type: string
                enum:
                  - artist
                  - author
                  - composer
                  - performer
                  - conductor
                  - choir
                  - leader
                  - ensemble
                  - orchestra
                  - soloist
                  - producer
                  - engineer
              normDb:
                nullable: true
                type: object
                properties:
                  type:
                    type: string
                  id:
                    type: string
                required:
                  - type
                  - id
                additionalProperties: false
              isni:
                nullable: true
                type: string
              url:
                nullable: true
                type: string
            required:
              - name
              - role
            additionalProperties: false
        services:
          minItems: 1
          type: array
          items:
            $ref: '#/definitions/services'
        references:
          nullable: true
          type: array
          items:
            $ref: '#/definitions/reference'
        playlistItemId:
          type: string
        hfdbIds:
          nullable: true
          type: array
          items:
            type: string
        externalId:
          nullable: true
          type: string
        isrc:
          nullable: true
          type: string
        upc:
          nullable: true
          type: string
        mpn:
          nullable: true
          type: string
        media:
          nullable: true
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum:
                  - cover
                  - artist
                  - anchor
                  - audio
                  - video
              url:
                type: string
              templateUrl:
                nullable: true
                type: string
              description:
                type: string
              attribution:
                nullable: true
                type: string
              isFallback:
                type: boolean
            required:
              - type
              - url
              - description
            additionalProperties: false
        plugins:
          nullable: true
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              isDeactivated:
                type: boolean
              note:
                type: string
            required:
              - type
            additionalProperties: false
        id:
          type: string
      required:
        - type
        - start
        - title
        - services
        - playlistItemId
      additionalProperties: false
      definitions:
        services:
          type: object
          properties:
            type:
              type: string
              enum:
                - EventLivestream
                - PermanentLivestream
            externalId:
              type: string
            publisherId:
              type: string
            id:
              type: string
          required:
            - type
            - externalId
            - publisherId
          additionalProperties: false
        reference:
          type: object
          properties:
            type:
              type: string
              enum:
                - Episode
                - Section
                - Publication
                - Broadcast
                - Show
                - Season
                - Article
            id:
              type: string
              pattern: ^urn:ard:[a-z0-9-]+:[a-z0-9-]+$
            externalId:
              nullable: true
              type: string
              pattern: ^(c|b)rid:\/\/.+$
            title:
              type: string
            url:
              type: string
            alternateIds:
              type: array
              items:
                type: string
          required:
            - type
            - externalId
          additionalProperties: false
    eventV1PostRadioTextBody:
      type: object
      properties:
        event:
          type: string
          enum:
            - de.ard.eventhub.v1.radio.text
        start:
          $ref: '#/definitions/__schema0'
        validUntil:
          $ref: '#/definitions/__schema0'
        text:
          type: string
        services:
          minItems: 1
