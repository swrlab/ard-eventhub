                  - description
                additionalProperties: false
            plugins:
              nullable: true
              type: array
              items:
                type: object
                properties:
                  type:
                    type: string
                  isDeactivated:
                    type: boolean
                  note:
                    type: string
                required:
                  - type
                additionalProperties: false
            id:
              type: string
          required:
            - type
            - start
            - title
            - services
            - playlistItemId
          additionalProperties: false
        services:
          type: object
          properties:
            type:
              type: string
              enum:
                - EventLivestream
                - PermanentLivestream
            externalId:
              type: string
            publisherId:
              type: string
            id:
              type: string
          required:
            - type
            - externalId
            - publisherId
          additionalProperties: false
        reference:
          type: object
          properties:
            type:
              type: string
              enum:
                - Episode
                - Section
                - Publication
                - Broadcast
                - Show
                - Season
                - Article
            id:
              type: string
              pattern: ^urn:ard:[a-z0-9-]+:[a-z0-9-]+$
            externalId:
              nullable: true
              type: string
              pattern: ^(c|b)rid:\/\/.+$
            title:
              type: string
            url:
              type: string
            alternateIds:
              type: array
              items:
                type: string
          required:
