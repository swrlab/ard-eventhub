          additionalProperties: false
    eventV1ResBody:
      type: object
      properties:
        statuses:
          type: object
          properties:
            published:
              type: integer
              minimum: -9007199254740991
              maximum: 9007199254740991
            blocked:
              type: integer
              minimum: -9007199254740991
              maximum: 9007199254740991
            failed:
              type: integer
              minimum: -9007199254740991
              maximum: 9007199254740991
          required:
            - published
            - blocked
            - failed
          additionalProperties: false
        event:
          $ref: '#/definitions/eventV1PostBody'
        plugins:
