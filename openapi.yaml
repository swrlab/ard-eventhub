              items:
                type: object
                properties:
                  name:
                    type: string
                  role:
                    type: string
                    enum:
                      - artist
                      - author
                      - composer
                      - performer
                      - conductor
                      - choir
                      - leader
                      - ensemble
                      - orchestra
                      - soloist
                      - producer
                      - engineer
                  normDb:
                    nullable: true
                    type: object
                    properties:
                      type:
                        type: string
                      id:
                        type: string
                    required:
                      - type
                      - id
                    additionalProperties: false
                  isni:
                    nullable: true
                    type: string
                  url:
                    nullable: true
                    type: string
                required:
                  - name
                  - role
                additionalProperties: false
            services:
              minItems: 1
              type: array
              items:
                $ref: '#/definitions/services'
            references:
              nullable: true
              type: array
              items:
                $ref: '#/definitions/reference'
            playlistItemId:
              type: string
            hfdbIds:
              nullable: true
              type: array
              items:
                type: string
            externalId:
              nullable: true
              type: string
            isrc:
              nullable: true
              type: string
            upc:
              nullable: true
              type: string
            mpn:
              nullable: true
              type: string
            media:
              nullable: true
              type: array
              items:
                type: object
                properties:
                  type:
                    type: string
                    enum:
                      - cover
                      - artist
                      - anchor
                      - audio
                      - video
                  url:
                    type: string
                  templateUrl:
                    nullable: true
                    type: string
                  description:
                    type: string
                  attribution:
                    nullable: true
                    type: string
                  isFallback:
                    type: boolean
                required:
                  - type
