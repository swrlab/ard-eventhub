                - de.ard.eventhub.v1.radio.text
            start:
              $ref: '#/definitions/__schema0'
            validUntil:
              $ref: '#/definitions/__schema0'
            text:
              type: string
            services:
              minItems: 1
              type: array
              items:
                $ref: '#/definitions/services'
          required:
            - start
            - validUntil
            - text
            - services
          additionalProperties: false
        __schema0:
          type: string
          format: iso8601-timestamp
        services:
          type: object
          properties:
            type:
              type: string
              enum:
                - EventLivestream
                - PermanentLivestream
            externalId:
              type: string
            publisherId:
              type: string
            id:
              type: string
          required:
            - type
            - externalId
            - publisherId
          additionalProperties: false
    subscriptionPost:
      type: object
      properties:
        type:
          type: string
          enum:
            - PUBSUB
        method:
          type: string
          enum:
            - PUSH
        url:
          type: string
        contact:
          type: string
        topic:
          type: string
      required:
        - type
        - method
        - url
        - contact
        - topic
      additionalProperties: false
    subscriptionResponse:
      type: object
      properties:
        type:
          type: string
          enum:
            - PUBSUB
